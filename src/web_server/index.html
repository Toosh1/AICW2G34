<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pisces — Train Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="rail-line"></div>
  <div class="rail-line right"></div>

  <div class="topbar"></div>

  <header class="header">
    <svg class="logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="8" width="24" height="16" rx="4" fill="#1a1917"/>
      <rect x="9" y="11" width="7" height="5" rx="1.5" fill="#f5f4f0"/>
      <rect x="20" y="11" width="7" height="5" rx="1.5" fill="#f5f4f0"/>
      <rect x="6" y="20" width="24" height="4" rx="1" fill="#1a1917"/>
      <circle cx="11" cy="27" r="3" fill="#1a1917"/>
      <circle cx="25" cy="27" r="3" fill="#1a1917"/>
      <rect x="17" y="8" width="2" height="3" rx="1" fill="#6b6960"/>
    </svg>
    <div class="header-text">
      <h1>Pisces</h1>
      <p>Train assistant</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div class="divider"></div>

  <main class="messages" id="messages">
    <div class="msg bot">
      <div class="bubble">
        All aboard! I'm Pisces, your train assistant. Ask me about routes, schedules, delays, or anything else on the rails.
      </div>
      <span class="timestamp">now</span>
    </div>
  </main>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Ask about trains…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="#f5f4f0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

  <script src="index.js"></script>
</body>
</html>
